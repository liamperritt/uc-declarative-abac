name: Deploy UC Declarative ABAC
description: Deploy Unity Catalog Attribute-Based Access Control configuration.
author: Liam Perritt
branding:
  icon: shield
  color: blue

inputs:
  config-dir:
    description: Path to the YAML config directory, relative to the caller's repo root.
    required: true
  warehouse-id:
    description: SQL warehouse ID the engine will use to execute UC queries.
    required: true
  profile:
    description: >-
      Optional Databricks CLI profile name from ~/.databrickscfg. Omit (leave empty)
      to use unified auth via environment variables — e.g. DATABRICKS_HOST +
      DATABRICKS_TOKEN (PAT), DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET (OAuth M2M),
      or a metadata/managed-identity source. Set these on the step's env block.
    required: false
    default: ''
  dry-run:
    description: If "true", print the planned changes without executing them.
    required: false
    default: 'false'
  use-workspace-scim:
    description: >-
      If "true", fetch principals from the workspace SCIM API instead of the account
      SCIM proxy. This can be useful for limited test runs against a test workspace.
      In this mode the account-level system groups "account users" and "account admins"
      are automatically included, since the workspace SCIM API does not surface them.
    required: false
    default: 'false'
  enable-tag-management:
    description: >-
      If "true", permit the engine to create/update/remove tag assignments on securables.
      Off by default — when unset, the tags domain is skipped in both dry-run and real-run.
    required: false
    default: 'false'
  enable-privilege-management:
    description: >-
      If "true", permit the engine to GRANT/REVOKE privileges via SQL. Off by default —
      when unset, the privileges domain is skipped in both dry-run and real-run.
    required: false
    default: 'false'
  enable-taggable-management:
    description: >-
      If "true", permit the engine to update attributes (e.g. owner) on existing
      catalogs, schemas, tables, and volumes. Off by default — when unset, non-function
      attribute updates are skipped.
    required: false
    default: 'false'
  enable-taggable-creation:
    description: >-
      If "true", permit the engine to create catalogs, schemas, tables, and volumes
      declared in config but absent from Unity Catalog. Off by default — when unset,
      missing non-function securables raise NonexistentSecurableError.
    required: false
    default: 'false'
  manage-tags-for-catalogs:
    description: >-
      Comma-separated catalog names to scope tag management to (default '*' = all
      configured catalogs). No effect unless ``enable-tag-management`` is set.
    required: false
    default: '*'
  manage-privileges-for-catalogs:
    description: >-
      Comma-separated catalog names to scope privilege management to (default '*'
      = all configured catalogs). No effect unless ``enable-privilege-management``
      is set.
    required: false
    default: '*'
  manage-taggables-for-catalogs:
    description: >-
      Comma-separated catalog names to scope taggable attribute updates (e.g.
      owner) to (default '*' = all configured catalogs). Function attributes
      always flow through. No effect unless ``enable-taggable-management`` is set.
    required: false
    default: '*'
  create-taggables-for-catalogs:
    description: >-
      Comma-separated catalog names to scope creation of missing catalogs/schemas
      /tables/volumes to (default '*' = all configured catalogs). Function
      creation always flows through. No effect unless ``enable-taggable-creation``
      is set.
    required: false
    default: '*'
  retain-tag-prefixes:
    description: >-
      Comma-separated tag-key prefixes that must never be removed from
      securables, even when absent from config (the engine may still add/update
      them). Defaults to "class." to protect UC auto data classification tags.
      Set to an empty string to allow removing any unconfigured tag.
    required: false
    default: 'class.'
  enable-governed-tag-deletion:
    description: >-
      If "true", permit the engine to delete governed tags (account-level tag
      policies) that exist in the account but are absent from config. Off by default.
      Requires interactive confirmation unless ``force`` is also "true"; in a
      non-interactive GitHub Actions runner, ``force`` MUST be set or the run
      will error out.
    required: false
    default: 'false'
  force:
    description: >-
      If "true", skip every interactive confirmation prompt and auto-confirm
      destructive actions. Required in non-interactive CI contexts (e.g. GitHub
      Actions) whenever a destructive gate like ``enable-governed-tag-deletion``
      is also set.
    required: false
    default: 'false'
  max-parallel-changes:
    description: >-
      Max worker threads used per (securable_type, change_type) execution
      batch. Defaults to "8". Set to "1" to disable parallelism and force
      sequential execution.
    required: false
    default: '8'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uc-declarative-abac
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install "$ACTION_PATH/.."

    - name: Run uc-declarative-abac
      shell: bash
      env:
        CONFIG_DIR: ${{ inputs.config-dir }}
        WAREHOUSE_ID: ${{ inputs.warehouse-id }}
        PROFILE: ${{ inputs.profile }}
        DRY_RUN: ${{ inputs.dry-run }}
        USE_WORKSPACE_SCIM: ${{ inputs.use-workspace-scim }}
        ENABLE_TAG_MANAGEMENT: ${{ inputs.enable-tag-management }}
        ENABLE_PRIVILEGE_MANAGEMENT: ${{ inputs.enable-privilege-management }}
        ENABLE_TAGGABLE_MANAGEMENT: ${{ inputs.enable-taggable-management }}
        ENABLE_TAGGABLE_CREATION: ${{ inputs.enable-taggable-creation }}
        MANAGE_TAGS_FOR_CATALOGS: ${{ inputs.manage-tags-for-catalogs }}
        MANAGE_PRIVILEGES_FOR_CATALOGS: ${{ inputs.manage-privileges-for-catalogs }}
        MANAGE_TAGGABLES_FOR_CATALOGS: ${{ inputs.manage-taggables-for-catalogs }}
        CREATE_TAGGABLES_FOR_CATALOGS: ${{ inputs.create-taggables-for-catalogs }}
        RETAIN_TAG_PREFIXES: ${{ inputs.retain-tag-prefixes }}
        ENABLE_GOVERNED_TAG_DELETION: ${{ inputs.enable-governed-tag-deletion }}
        FORCE: ${{ inputs.force }}
        MAX_PARALLEL_CHANGES: ${{ inputs.max-parallel-changes }}
      run: |
        args=(
          --config-dir "$CONFIG_DIR"
          --warehouse-id "$WAREHOUSE_ID"
        )
        if [[ -n "$PROFILE" ]]; then
          args+=(--profile "$PROFILE")
        fi
        if [[ "$DRY_RUN" == "true" ]]; then
          args+=(--dry-run)
        fi
        if [[ "$USE_WORKSPACE_SCIM" == "true" ]]; then
          args+=(--use-workspace-scim)
        fi
        if [[ "$ENABLE_TAG_MANAGEMENT" == "true" ]]; then
          args+=(--enable-tag-management)
        fi
        if [[ "$ENABLE_PRIVILEGE_MANAGEMENT" == "true" ]]; then
          args+=(--enable-privilege-management)
        fi
        if [[ "$ENABLE_TAGGABLE_MANAGEMENT" == "true" ]]; then
          args+=(--enable-taggable-management)
        fi
        if [[ "$ENABLE_TAGGABLE_CREATION" == "true" ]]; then
          args+=(--enable-taggable-creation)
        fi
        args+=(--manage-tags-for-catalogs "$MANAGE_TAGS_FOR_CATALOGS")
        args+=(--manage-privileges-for-catalogs "$MANAGE_PRIVILEGES_FOR_CATALOGS")
        args+=(--manage-taggables-for-catalogs "$MANAGE_TAGGABLES_FOR_CATALOGS")
        args+=(--create-taggables-for-catalogs "$CREATE_TAGGABLES_FOR_CATALOGS")
        args+=(--retain-tag-prefixes "$RETAIN_TAG_PREFIXES")
        if [[ "$ENABLE_GOVERNED_TAG_DELETION" == "true" ]]; then
          args+=(--enable-governed-tag-deletion)
        fi
        if [[ "$FORCE" == "true" ]]; then
          args+=(--force)
        fi
        args+=(--max-parallel-changes "$MAX_PARALLEL_CHANGES")
        python -m uc_declarative_abac "${args[@]}"
