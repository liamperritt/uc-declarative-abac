definitions:
  policies:
    pii|mask_pii:
      name: mask_pii
      comment: Policy for masking columns with PII values via 'uc_gov_pii' column tag
      type: mask
      column:
        alias: pii
        has_tags:
          uc_gov_pii: '*'
      function:
        name: fn_mask_pii
        comment: Function that masks the given PII value
        parameters:
          - name: pii
            type: string
        return: "CONCAT('####', SUBSTRING(pii, -4))"
      to:
        - uc_governor_test_team
